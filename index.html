<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Mechanics | Gym Trainer Portfolio</title>
    <link rel="stylesheet" href="Style.css"> 
</head>
<body>

    <nav class="top-nav">
        <div id="profile-anchor" class="profile-wrapper">
            <img src="https://raw.githubusercontent.com/selammengistu0005-ai/my_photo/main/Screenshot%202026-02-12%20154349.png" 
                alt="Dawit Personal Trainer" 
                class="main-profile-img" 
                style="cursor: pointer;" 
                onclick="location.reload()">
            <div id="typing-container">
                <span id="typing-text"></span><span class="cursor">|</span>
            </div>
        </div>

        <div class="theme-toggle" onclick="toggleTheme()">
            <div class="dumbbell-icon">
                <div class="bar"></div>
                <div class="weight left"></div>
                <div class="weight right"></div>
            </div>
        </div>
    </nav>

    <header class="hero-spacer">
        </header>

    <main class="content-wrapper">
        <section class="bio-section">
            <div class="boxer-container">
                <div class="circle-bg"></div>
                <img src="https://raw.githubusercontent.com/selammengistu0005-ai/dawitGYM/main/out_of_bound.png" 
                    alt="Elite Boxer" 
                    class="out-of-bounds-img">
            </div>
            <h2>The Science of Strength</h2>
            <p>Mastering professional mechanics for explosive power and peak hypertrophy.</p>
        </section>

        <section class="plans-carousel-section">
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="plan-card active-card">
                        <div class="glass-content">
                            <h3>Tyson Peak</h3>
                            <p>Explosive Power & Speed Protocol</p>
                            <button class="join-btn">View Plan</button>
                        </div>
                    </div>
                    <div class="plan-card right-card">
                        <div class="glass-content">
                            <h3>Hypertrophy</h3>
                            <p>Maximal Muscle Growth Phase</p>
                            <button class="join-btn">View Plan</button>
                        </div>
                    </div>
                    <div class="plan-card left-card">
                        <div class="glass-content">
                            <h3>Garcia Mechanics</h3>
                            <p>Technical Hook & Footwork Study</p>
                            <button class="join-btn">View Plan</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
   </main>
    <script src="Scripts.js"></script>
</body>
</html>
